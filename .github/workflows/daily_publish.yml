name: Daily Medium Publish

on:
  schedule:
    - cron: '0 9 * * *' # 매일 09:00 UTC에 실행
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run generator and publish
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MEDIUM_INTEGRATION_TOKEN: ${{ secrets.MEDIUM_INTEGRATION_TOKEN }}
        run: |
          python src/generate_and_publish.py --action generate_and_publish --topic "Daily development insight - $(date -u +'%Y-%m-%d')" --publish_status draft --tags programming,dev
