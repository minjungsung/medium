name: Daily Medium Publish

on:
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run generator and publish
        env:
          # Many accounts cannot create Medium Integration Tokens anymore, so this workflow generates only.
          LLM_PROVIDER: github_models
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          python src/generate_and_publish.py --action generate --topic "Daily development insight - $(date -u +'%Y-%m-%d')" --outdir posts --site_dir site
